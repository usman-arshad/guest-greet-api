version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: guestgreet-db
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: guestgreet-face
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - FACE_MODEL_NAME=${FACE_MODEL_NAME}
      - FACE_DETECTION_THRESHOLD=${FACE_DETECTION_THRESHOLD}
    volumes:
      - ./face-service/app:/app/app
      - face_models:/root/.insightface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nest-api:
    build:
      context: ./nest-api
      dockerfile: Dockerfile
    container_name: guestgreet-api
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - FACE_SERVICE_URL=http://face-service:8000
      - FACE_SERVICE_TIMEOUT=${FACE_SERVICE_TIMEOUT}
      - RECOGNITION_COOLDOWN_MINUTES=${RECOGNITION_COOLDOWN_MINUTES}
    volumes:
      - ./nest-api/src:/app/src
      - ./nest-api/tsconfig.json:/app/tsconfig.json
      - ./nest-api/nest-cli.json:/app/nest-cli.json
      - ./nest-api/uploads:/app/uploads
    command: npx nest start --watch
    depends_on:
      postgres:
        condition: service_healthy
      face-service:
        condition: service_started

volumes:
  postgres_data:
  face_models:
