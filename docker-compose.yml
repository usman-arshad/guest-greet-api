version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: guestgreet-db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: guestgreet-face
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - FACE_MODEL_NAME=${FACE_MODEL_NAME}
      - FACE_DETECTION_THRESHOLD=${FACE_DETECTION_THRESHOLD}
    volumes:
      - face_models:/root/.insightface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nest-api:
    build:
      context: ./nest-api
      dockerfile: Dockerfile
    container_name: guestgreet-api
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      # Only override values that differ inside Docker network
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - FACE_SERVICE_URL=http://face-service:8000
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      face-service:
        condition: service_healthy

volumes:
  postgres_data:
  face_models:
  uploads:
